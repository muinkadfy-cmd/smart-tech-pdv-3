<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Segurança e Backup">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#111827" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0b1220" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect x="0" y="0" width="1200" height="600" rx="28" fill="url(#g2)"/>
  <path d="M0,440 C250,350 350,560 600,470 C820,390 910,420 1200,340 L1200,600 L0,600 Z" fill="url(#g)"/>
  <circle cx="180" cy="140" r="86" fill="#10b981" opacity="0.14" filter="url(#soft)"/>
  <circle cx="1040" cy="120" r="110" fill="#60a5fa" opacity="0.12" filter="url(#soft)"/>

  <!-- Cartão / Pasta -->
  <g transform="translate(160 170)">
    <rect x="0" y="0" width="420" height="260" rx="18" fill="#0f172a" stroke="#334155" stroke-opacity="0.9"/>
    <path d="M42 78 h140 l22 -24 h166 a28 28 0 0 1 28 28 v22 H42 Z" fill="#111c33" stroke="#334155" stroke-opacity="0.9"/>
    <rect x="42" y="118" width="336" height="34" rx="10" fill="#0b1220" stroke="#334155" stroke-opacity="0.75"/>
    <rect x="42" y="170" width="280" height="24" rx="8" fill="#0b1220" opacity="0.75"/>
    <rect x="42" y="206" width="210" height="24" rx="8" fill="#0b1220" opacity="0.55"/>

    <!-- seta download -->
    <g transform="translate(330 140)">
      <circle cx="54" cy="54" r="52" fill="#0b1220" stroke="#22c55e" stroke-opacity="0.65"/>
      <path d="M54 26 v44" stroke="#22c55e" stroke-width="10" stroke-linecap="round"/>
      <path d="M34 56 L54 76 L74 56" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Escudo -->
  <g transform="translate(700 120)">
    <path d="M200 34
             C200 34 250 56 300 70
             V190
             C300 280 240 350 200 370
             C160 350 100 280 100 190
             V70
             C150 56 200 34 200 34 Z"
          fill="#0f172a" stroke="#60a5fa" stroke-opacity="0.75" stroke-width="6"/>

    <path d="M200 90
             C225 110 255 125 285 132
             V190
             C285 260 235 312 200 330
             C165 312 115 260 115 190
             V132
             C145 125 175 110 200 90 Z"
          fill="rgba(96,165,250,0.10)"/>

    <!-- check -->
    <path d="M158 200 L190 232 L246 168" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Texto -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif">
    <text x="160" y="120" font-size="44" fill="#e5e7eb" font-weight="700">Backup + Segurança</text>
    <text x="160" y="156" font-size="22" fill="#9ca3af">Mantenha backups recentes e sua licença guardada em local seguro.</text>
  </g>

  <!-- linhas decorativas -->
  <g opacity="0.22" stroke="#94a3b8" stroke-width="2">
    <path d="M70 520 H480"/>
    <path d="M820 480 H1130"/>
  </g>
</svg>
