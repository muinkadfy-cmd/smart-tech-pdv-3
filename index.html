<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons (public/icons) -->
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <!-- A11y: permitir zoom (não bloquear user scaling). Mantém viewport-fit para notch/safe-area. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Smart Tech" />
    <meta name="application-name" content="Smart Tech" />
    <meta name="msapplication-TileColor" content="#4CAF50" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <meta name="description" content="Smart Tech - Sistema de gestão financeira e controle de vendas" />
    <meta name="theme-color" content="#4CAF50" />

    <!-- Theme preload (evita "piscar" ao abrir) -->
    <script>
      (function () {
        try {
          var KEY = "smart-tech-theme";
          var theme = "dark";
          try { localStorage.setItem(KEY, theme); } catch (e) {}
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.classList.add("theme-preload");
          requestAnimationFrame(function () {
            document.documentElement.classList.remove("theme-preload");
          });
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Smart Tech" />
    <!-- Android Chrome -->
    <meta name="application-name" content="Smart Tech" />
    <meta name="msapplication-TileColor" content="#4CAF50" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <!-- Fullscreen Android -->
    <meta name="apple-touch-fullscreen" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Smart Tech</title>
  </head>
  <body>
    <!-- ✅ P0 (Pré-login): splash ultra-leve para eliminar "tela branca" até o React montar.
         React substitui esse conteúdo automaticamente no primeiro render. -->
    <div id="root">
      <div id="preload-splash" role="status" aria-label="Carregando" style="
        display:flex;align-items:center;justify-content:center;
        min-height:100vh;
        color:rgba(255,255,255,.82);
        background:radial-gradient(1200px 600px at 50% 0%, rgba(76,175,80,.12), rgba(0,0,0,0)),
                   linear-gradient(180deg, #0b0f10, #070a0b);
        font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div aria-hidden="true" style="
            width:22px;height:22px;border-radius:50%;
            border:3px solid rgba(255,255,255,.18);
            border-top-color: rgba(76,175,80,.95);
            animation:preloadSpin .8s linear infinite;"></div>
          <div style="font-size:14px;letter-spacing:.2px;">Abrindo Smart Tech…</div>
        </div>
      </div>
    </div>
    <style>
      @keyframes preloadSpin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
      /* reduz jank em PCs fracos */
      @media (prefers-reduced-motion: reduce) { #preload-splash div[aria-hidden="true"] { animation:none; } }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
